<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON GALAXY</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --bg: #0b0b0b; --card: #161616; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; overflow: hidden; }
        
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; }
        .active-screen { display: flex; }

        .header { padding: 15px; display: flex; justify-content: space-between; align-items: center; background: #000; border-bottom: 1px solid #222; }
        .bal { background: #1a1a1a; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); color: var(--neon); font-weight: bold; }

        /* СЕТКА ИГР */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .item { background: var(--card); border-radius: 15px; padding: 20px; text-align: center; border: 1px solid #222; }
        .item:active { background: #222; transform: scale(0.95); }
        .item i { font-size: 35px; margin-bottom: 10px; display: block; }

        /* CRASH */
        .crash-box { height: 180px; background: #000; margin: 15px; border-radius: 15px; position: relative; border: 1px solid #333; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 30px; transition: 0.1s; }
        .m-val { font-size: 45px; font-weight: bold; text-shadow: 0 0 10px var(--neon); }

        /* КНОПКИ */
        .btn { width: 90%; margin: 10px auto; padding: 15px; border-radius: 12px; border: none; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-blue { background: var(--neon); color: #000; }
        .input-bet { width: 85%; display: block; margin: 0 auto 10px; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; text-align: center; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; border-top: 1px solid #222; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #555; text-decoration: none; font-size: 11px; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

<div id="scr-main" class="screen active-screen">
    <div class="header">
        <span>TON GALAXY</span>
        <div class="bal" id="bal1">100.00 TON</div>
    </div>
    <div class="grid">
        <div class="item" onclick="show('crash')"><i class="fas fa-rocket" style="color:#ffa500"></i>CRASH</div>
        <div class="item" onclick="alert('Скоро!')"><i class="fas fa-bomb" style="color:#ff4444"></i>MINES</div>
        <div class="item" onclick="alert('Скоро!')"><i class="fas fa-dice" style="color:var(--neon)"></i>DICE</div>
        <div class="item" onclick="alert('Скоро!')"><i class="fas fa-coins" style="color:#ffcc00"></i>SLOTS</div>
    </div>
</div>

<div id="scr-crash" class="screen">
    <div class="header"><span onclick="show('main')">⬅ НАЗАД</span><div class="bal" id="bal2">100.00 TON</div></div>
    <div class="crash-box">
        <div id="rocket">🚀</div>
        <div class="m-val" id="mult">1.00x</div>
    </div>
    <input type="number" id="bet" class="input-bet" value="10">
    <button class="btn btn-blue" id="go" onclick="startRocket()">ПОСТАВИТЬ</button>
</div>

<div id="scr-prof" class="screen">
    <div class="header"><span>ПРОФИЛЬ</span></div>
    <div style="text-align: center; padding-top: 40px;">
        <i class="fas fa-user-circle" style="font-size: 60px; color: var(--neon)"></i>
        <h2 id="u-name">Player</h2>
        <button class="btn btn-blue" style="width: 80%" onclick="pay()">📥 ПОПОЛНИТЬ TON</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="show('main')"><i class="fas fa-home"></i>HOME</div>
    <div class="nav-item" onclick="show('prof')"><i class="fas fa-user"></i>PROFILE</div>
</nav>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const WALLET = "UQBtkrIzQeK1bfSJD9N71EcvCJwnegvLs3t-fLuGgmLESSL4";

    function show(name) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById('scr-' + name).classList.add('active-screen');
        tg.HapticFeedback.impactOccurred('light');
    }

    // ПОПОЛНЕНИЕ - ТЕПЕРЬ ТОЧНО РАБОТАЕТ
    function pay() {
        let amt = prompt("Сумма TON:", "10");
        if(amt) {
            let link = `ton://transfer/${WALLET}?amount=${amt * 1000000000}&text=Galaxy`;
            tg.openLink(link);
        }
    }

    // ИГРА РАКЕТКА
    function startRocket() {
        let btn = document.getElementById('go');
        let rocket = document.getElementById('rocket');
        let mTxt = document.getElementById('mult');
        
        btn.disabled = true;
        btn.innerText = "В ИГРЕ...";
        
        let m = 1.00;
        let crash = (Math.random() * 3 + 1.1).toFixed(2); // Рандом для теста
        
        let t = setInterval(() => {
            m += 0.05;
            mTxt.innerText = m.toFixed(2) + "x";
            rocket.style.bottom = (m * 10) + "px";
            rocket.style.left = (m * 10) + "px";

            if(m >= crash) {
                clearInterval(t);
                rocket.innerText = "💥";
                mTxt.style.color = "red";
                tg.HapticFeedback.notificationOccurred('error');
                setTimeout(() => {
                    rocket.innerText = "🚀";
                    rocket.style.bottom = "20px"; rocket.style.left = "20px";
                    mTxt.style.color = "white";
                    btn.disabled = false;
                    btn.innerText = "ПОСТАВИТЬ";
                }, 2000);
            }
        }, 100);
    }

    if(tg.initDataUnsafe.user) document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;
</script>
</body>
</html>
