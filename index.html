<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRKT Sniper Elite</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --neon-blue: #00e5ff;
            --neon-shadow: 0 0 10px #00e5ff, 0 0 20px #00e5ff;
            --gray-text: #888;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Верхняя панель: Баланс и Ава */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #1a1a1a;
        }

        .balance-box {
            display: flex;
            flex-direction: column;
        }

        .balance-label { font-size: 12px; color: var(--gray-text); }
        .balance-value { font-size: 20px; font-weight: bold; text-shadow: var(--neon-shadow); }

        .profile-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: var(--neon-shadow);
            cursor: pointer;
            overflow: hidden;
        }

        /* Основной контент (Вкладки) */
        .content {
            height: calc(100vh - 140px);
            overflow-y: auto;
            padding: 20px;
        }

        .tab-content { display: none; }
        .active-tab { display: block; }

        /* Карточка NFT как на скрине */
        .nft-card {
            background: #111;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-left: 3px solid var(--neon-blue);
        }

        .nft-info { display: flex; align-items: center; gap: 10px; }
        .nft-img { width: 45px; height: 45px; border-radius: 8px; background: #222; }
        .price-up { color: #00ff88; font-size: 14px; }
        .price-down { color: #ff4444; font-size: 14px; }

        /* Нижнее меню */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #0a0a0a;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #222;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--gray-text);
            font-size: 10px;
            cursor: pointer;
        }

        .nav-item.active { color: var(--neon-blue); text-shadow: var(--neon-shadow); }
        .nav-icon { font-size: 24px; margin-bottom: 4px; }

        /* Кнопка назад */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--gray-text);
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <div class="header">
            <div class="balance-box">
                <span class="balance-label">TON BALANCE</span>
                <span class="balance-value" id="user-balance">0.00 TON</span>
            </div>
            <div class="profile-btn" onclick="showTab('profile')">
                <img id="user-avatar" src="" style="width:100%; height:100%; object-fit: cover;">
            </div>
        </div>

        <div class="content">
            <div id="market" class="tab-content active-tab">
    <h3 style="color: var(--neon-blue)">Trending NFTs</h3>
    <div id="nft-list">
        <p style="text-align:center; color:#555;">Загрузка данных...</p>
    </div>
</div>

            <div id="profile" class="tab-content">
                <div class="back-btn" onclick="showTab('market')">← Назад</div>
                <h2 style="margin-top: 50px; text-align: center;">Мой Профиль</h2>
                <button style="width:100%; padding:15px; margin-bottom:10px; background:var(--neon-blue); border:none; border-radius:10px; font-weight:bold;">Пополнить TON</button>
                <button style="width:100%; padding:15px; background:#222; color:white; border:none; border-radius:10px;">Подключить Tonkeeper</button>
            </div>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="showTab('market')">
                <span class="nav-icon">📊</span>
                <span>МАРКЕТ</span>
            </div>
            <div class="nav-item" onclick="showTab('sniper')">
                <span class="nav-icon">🎯</span>
                <span>СНАЙПЕР</span>
            </div>
            <div class="nav-item" onclick="showTab('profile')">
                <span class="nav-icon">👤</span>
                <span>ПРОФИЛЬ</span>
            </div>
        </nav>
    </div>

  <script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // СЮДА ВСТАВЛЯЙ ССЫЛКУ ИЗ NGROK КАЖДЫЙ РАЗ ПРИ ПЕРЕЗАПУСКЕ
    const API_URL = "https://unhazy-overcaustic-alica.ngrok-free.dev -> http://localhost:8000";

    async function updateDashboard() {
        try {
            // Запрос баланса
            const balResponse = await fetch(`${API_URL}/api/balance`);
            const balData = await balResponse.json();
            document.getElementById('balance-value').innerText = `${balData.balance} TON`;

            // Запрос NFT
            const nftResponse = await fetch(`${API_URL}/api/trending`);
            const nfts = await nftResponse.json();
            renderNFTs(nfts);

        } catch (error) {
            console.error("Ошибка обновления:", error);
            document.getElementById('nft-list').innerHTML = "<p style='color:red; text-align:center;'>Ошибка связи с бэкендом</p>";
        }
    }

    function renderNFTs(nfts) {
        const container = document.getElementById('nft-list');
        container.innerHTML = '';
        nfts.forEach(nft => {
            container.innerHTML += `
                <div class="nft-card">
                    <div class="nft-info">
                        <img src="${nft.image}" class="nft-img" onerror="this.src='https://via.placeholder.com/45'">
                        <div><b>${nft.name}</b><br><span style="color:#555">#${nft.id}</span></div>
                    </div>
                    <div style="text-align: right;">
                        <b>${nft.floor} TON</b><br>
                        <span class="${nft.change >= 0 ? 'price-up' : 'price-down'}">
                            ${nft.change >= 0 ? '▲' : '▼'} ${Math.abs(nft.change)}%
                        </span>
                    </div>
                </div>`;
        });
    }

    // Запуск при загрузке
    updateDashboard();

    // Твоя функция переключения вкладок
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active-tab'));
        document.getElementById(tabId).classList.add('active-tab');
    }

    if (tg.initDataUnsafe.user) {
        document.getElementById('user-avatar').src = tg.initDataUnsafe.user.photo_url || "";
    }
</script>
</body>
</html>
