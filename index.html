<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sniper Elite</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --neon-blue: #00e5ff;
            --bg-dark: #050505;
            --card-bg: rgba(20, 20, 20, 0.8);
            --neon-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* Неоновые пауки на фоне */
        #spider-canvas {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        .container { padding: 20px; padding-bottom: 80px; }

        /* Шапка с балансом */
        .balance-box {
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 15px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--neon-shadow);
            margin-bottom: 25px;
        }

        .balance-value { font-size: 24px; font-weight: bold; color: var(--neon-blue); }

        /* Вкладки */
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .active-tab { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Снайпер: Маркетплейсы */
        .market-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .market-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }
        .market-card:active { border-color: var(--neon-blue); transform: scale(0.95); }
        .market-card i { font-size: 24px; margin-bottom: 8px; display: block; }

        /* Нижнее меню */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%;
            background: rgba(10, 10, 10, 0.95);
            display: flex; justify-content: space-around;
            padding: 15px 0; border-top: 1px solid #222;
        }

        .nav-item { color: #555; text-align: center; transition: 0.3s; cursor: pointer; }
        .nav-item.active { color: var(--neon-blue); text-shadow: var(--neon-shadow); transform: translateY(-3px); }
        .nav-item i { font-size: 20px; }
        .nav-item span { font-size: 10px; display: block; margin-top: 4px; font-weight: bold; }

        /* Кнопка пополнения */
        .btn-deposit {
            width: 100%; padding: 15px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 12px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<canvas id="spider-canvas"></canvas>

<div class="container">
    <div class="balance-box">
        <div>
            <div style="font-size: 10px; color: #888;">MY BALANCE</div>
            <div class="balance-value" id="balance-value">0.00 TON</div>
        </div>
        <i class="fa-solid fa-circle-nodes" style="color: var(--neon-blue); font-size: 24px;"></i>
    </div>

    <div id="market" class="tab-content active-tab">
        <h3 style="color: var(--neon-blue);">LIVE FEED</h3>
        <div id="nft-list"><p style="color:#555">Waiting for connection...</p></div>
    </div>

    <div id="sniper" class="tab-content">
        <h3 style="color: var(--neon-blue);">SELECT MARKETPLACE</h3>
        <div class="market-grid">
    <div class="market-card" onclick="selectMarket('GetGems')">
        <i class="fas fa-gem"></i>GetGems
    </div>
    <div class="market-card" onclick="selectMarket('XPlus')">
        <i class="fas fa-bolt"></i>XPlus
    </div>
    <div class="market-card" onclick="selectMarket('Fragment')">
        <i class="fas fa-fragment"></i>Fragment
    </div>
    <div class="market-card" onclick="selectMarket('Trending')">
        <i class="fas fa-fire"></i>Trending
    </div>
</div>
    </div>

    <div id="profile" class="tab-content">
        <h3 style="color: var(--neon-blue);">MY ACCOUNT</h3>
        <div style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border-left: 3px solid var(--neon-blue);">
            <p id="user-name">Ruslan</p>
            <p style="font-size: 12px; color: #888;">Статус: Active</p>
        </div>
        <button class="btn-deposit" onclick="depositTON()">📥 ПОПОЛНИТЬ TON</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="showTab('market', this)">
        <i class="fas fa-store"></i><span>МАРКЕТ</span>
    </div>
    <div class="nav-item" onclick="showTab('sniper', this)">
        <i class="fas fa-crosshairs"></i><span>СНАЙПЕР</span>
    </div>
    <div class="nav-item" onclick="showTab('profile', this)">
        <i class="fas fa-user-shield"></i><span>ПРОФИЛЬ</span>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // ИСПРАВЬ ЭТУ ССЫЛКУ НА СВОЮ ИЗ NGROK (без лишних слов!)
    const API_URL = "https://unhazy-overcaustic-alicia.ngrok-free.dev";

    function showTab(tabId, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active-tab'));
        document.getElementById(tabId).classList.add('active-tab');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if (el) el.classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }
    // Функция для выбора маркета
function selectMarket(name) {
    tg.HapticFeedback.notificationOccurred('success');
    
    // Показываем уведомление внутри TG
    tg.showConfirm(`Вы выбрали ${name}. Запустить сканирование лотов?`, (confirmed) => {
        if (confirmed) {
            // Здесь будет логика запроса к бэкенду
            console.log(`Сканируем ${name}...`);
            // Можно вызвать функцию загрузки данных: fetchNFTs(name);
        }
    });
}

    function depositTON() {
        const wallet = "UQByH...ТВОЙ_АДРЕС"; // ВСТАВЬ СВОЙ АДРЕС
        tg.showPopup({
            title: 'Пополнение',
            message: 'Переведите TON на адрес:\n' + wallet,
            buttons: [{type: 'ok', text: 'Понял'}]
        });
    }

    async function updateData() {
        try {
            const res = await fetch(`${API_URL}/api/balance`);
            const data = await res.json();
            document.getElementById('balance-value').innerText = data.balance + " TON";
            // Тут можно добавить и отрисовку NFT
        } catch(e) { console.log("Offline mode"); }
    }

    // РИСУЕМ ПАУКОВ
    const canvas = document.getElementById('spider-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let particles = [];
    for(let i=0; i<35; i++) particles.push({x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.6, vy: (Math.random()-0.5)*0.6});

    function draw() {
        ctx.clearRect(0,0,canvas.width,canvas.height);
        ctx.strokeStyle = "rgba(0, 229, 255, 0.15)";
        ctx.lineWidth = 1;
        particles.forEach((p, i) => {
            p.x += p.vx; p.y += p.vy;
            if(p.x<0 || p.x>canvas.width) p.vx*=-1;
            if(p.y<0 || p.y>canvas.height) p.vy*=-1;
            particles.slice(i).forEach(p2 => {
                let d = Math.hypot(p.x-p2.x, p.y-p2.y);
                if(d < 110) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
            });
        });
        requestAnimationFrame(draw);
    }
    draw();
    updateData();

    if(tg.initDataUnsafe.user) {
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
    }
</script>
</body>
</html>
