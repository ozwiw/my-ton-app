<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON GALAXY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00e5ff; --pink: #ff00ff; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .container { padding: 20px; padding-bottom: 90px; height: 100vh; overflow-y: auto; }
        .card { background: rgba(20,20,20,0.8); border: 1px solid #333; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-pay { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        
        /* СФЕРА ИГРА */
        #sphere { width: 150px; height: 150px; border-radius: 50%; margin: 30px auto; background: radial-gradient(circle, #333, #000); box-shadow: 0 0 20px #222; transition: 0.5s; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--neon); }
    </style>
</head>
<body>

<div class="container">
    <div id="main" class="tab-content active-tab">
        <h2 style="color:var(--neon); text-align:center">TON GALAXY</h2>
        <div class="card" style="text-align:center">
            <small>БАЛАНС</small>
            <h1 id="bal">0.00 TON</h1>
        </div>

        <div class="card" style="text-align:center">
            <h3>🔮 NEON SPHERE</h3>
            <p>Угадай вспышку (X3)</p>
            <div id="sphere"></div>
            <div style="display:flex; gap:10px">
                <button class="btn" style="background:var(--neon)" onclick="playSphere('cyan')">CYAN</button>
                <button class="btn" style="background:var(--pink)" onclick="playSphere('pink')">PINK</button>
            </div>
        </div>
    </div>

    <div id="profile" class="tab-content" style="display:none">
        <h2>PROFILE</h2>
        <div class="card">
            <h3 id="u-name">Ruslan</h3>
            <button class="btn btn-pay" onclick="appDeposit()">💎 ПОПОЛНИТЬ</button>
        </div>
    </div>
</div>

<div class="nav">
    <a href="#" class="nav-item active" onclick="showTab('main', this)"><i class="fas fa-gamepad"></i><br>ИГРЫ</a>
    <a href="#" class="nav-item" onclick="showTab('profile', this)"><i class="fas fa-user"></i><br>ПРОФИЛЬ</a>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    const API = "https://ТВОЯ-ССЫЛКА.ngrok-free.app";

    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }

    async function playSphere(choice) {
        const s = document.getElementById('sphere');
        s.style.background = "white";
        tg.HapticFeedback.impactOccurred('heavy');
        
        setTimeout(() => {
            const winColor = Math.random() > 0.5 ? 'cyan' : 'pink';
            s.style.background = winColor === 'cyan' ? 'var(--neon)' : 'var(--pink)';
            s.style.boxShadow = `0 0 50px ${s.style.background}`;
            
            if(choice === winColor) {
                tg.showAlert("✨ ВСПЫШКА ВЕРНА! +1.5 TON");
            } else {
                tg.showAlert("💀 МИМО...");
            }
        }, 600);
    }

    function appDeposit() {
        tg.showPopup({
            title: 'Пополнение',
            message: 'Перейти в бота для ввода суммы?',
            buttons: [{type: 'ok', text: 'ДА'}]
        }, (b) => {
            tg.close(); // Закрываем апку, чтобы он оказался в боте
        });
    }

    async function load() {
        const res = await fetch(`${API}/api/balance`);
        const data = await res.json();
        document.getElementById('bal').innerText = data.balance + " TON";
    }
    load();
</script>
</body>
</html>
