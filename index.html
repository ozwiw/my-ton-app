<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TON GALAXY: OMNIVERSE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon: #00f2ff; --bg: #050505; --card: #0d0d0d; --brd: #1a1a1a;
            --green: #00ffa3; --red: #ff3131; --gold: #ffbd00;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh;
        }

        /* ЧАСТИЦЫ */
        #fx-canvas { position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999; }

        /* ЭКРАНЫ */
        .page {
            display: none; position: absolute; width: 100%; height: 100%;
            flex-direction: column; overflow: hidden;
        }
        .page.active { display: flex; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* UI ХЕДЕР */
        .top-nav {
            height: 70px; padding: 0 20px; display: flex; justify-content: space-between;
            align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--brd); z-index: 100;
        }
        .bal-wrap {
            background: var(--card); border: 1px solid var(--neon);
            padding: 8px 15px; border-radius: 20px; display: flex; align-items: center; gap: 8px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        /* КОНТЕНТ */
        .content { flex: 1; overflow-y: auto; padding: 20px 20px 100px; }

        /* ИГРОВОЙ ГРИД */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card-btn {
            background: var(--card); border: 1px solid var(--brd); border-radius: 24px;
            padding: 25px 15px; text-align: center; transition: 0.2s;
        }
        .card-btn:active { transform: scale(0.96); border-color: var(--neon); }
        .card-btn i { font-size: 38px; margin-bottom: 10px; display: block; }

        /* TOWER GAME (НОВАЯ) */
        .tower-grid { display: flex; flex-direction: column-reverse; gap: 5px; margin-bottom: 20px; }
        .tower-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; opacity: 0.5; pointer-events: none; }
        .tower-row.active-row { opacity: 1; pointer-events: auto; }
        .t-cell { background: #151515; height: 50px; border-radius: 8px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; }
        .t-cell.win { background: var(--green); color: #000; }
        .t-cell.lose { background: var(--red); }

        /* КВЕСТЫ */
        .quest-item {
            background: var(--card); padding: 15px; border-radius: 18px;
            margin-bottom: 10px; border-left: 4px solid var(--neon);
            display: flex; justify-content: space-between; align-items: center;
        }

        /* ПОПОЛНЕНИЕ */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98); z-index: 5000; display: none;
            flex-direction: column; padding: 40px 20px;
        }

        /* НИЖНЕЕ МЕНЮ */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: rgba(0,0,0,0.9); border-top: 1px solid var(--brd);
            display: flex; justify-content: space-around; align-items: center;
            padding-bottom: 20px; z-index: 1000;
        }
        .nav-item { color: #555; text-decoration: none; font-size: 10px; text-align: center; }
        .nav-item.active { color: var(--neon); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<canvas id="fx-canvas"></canvas>

<div class="top-nav">
    <div style="font-weight: 900; letter-spacing: 1px;">GALAXY <span style="color: var(--neon);">X</span></div>
    <div class="bal-wrap" id="adm-trigger">
        <img src="https://ton.org/download/ton_symbol.png" width="16">
        <span id="global-bal">0.00</span>
    </div>
</div>

<div id="p-home" class="page active">
    <div class="content">
        <div style="margin-bottom: 20px;">
            <p style="font-size: 12px; color: #555; text-transform: uppercase;">Игровые миры</p>
            <div class="grid-2">
                <div class="card-btn" onclick="go('crash')"><i class="fas fa-rocket" style="color:var(--gold)"></i><b>CRASH</b></div>
                <div class="card-btn" onclick="go('mines')"><i class="fas fa-bomb" style="color:var(--red)"></i><b>MINES</b></div>
                <div class="card-btn" onclick="go('tower')"><i class="fas fa-layer-group" style="color:var(--neon)"></i><b>TOWER</b></div>
                <div class="card-btn" onclick="go('quests')"><i class="fas fa-tasks" style="color:var(--green)"></i><b>QUESTS</b></div>
            </div>
        </div>
    </div>
</div>

<div id="p-tower" class="page">
    <div class="content">
        <div onclick="go('home')" style="margin-bottom: 20px;"><i class="fas fa-arrow-left"></i> Назад</div>
        <div class="tower-grid" id="tower-board"></div>
        <div class="card-btn" style="background:#111; padding:20px;">
            <input type="number" id="tower-bet" value="10" style="width:100%; background:none; border:none; color:#fff; text-align:center; font-size:20px;">
            <button onclick="startTower()" id="tower-btn" style="width:100%; padding:15px; margin-top:10px; border-radius:12px; border:none; background:var(--neon); font-weight:900;">ИГРАТЬ</button>
        </div>
    </div>
</div>

<div id="p-prof" class="page">
    <div class="content" style="text-align: center;">
        <div style="width:100px; height:100px; background:var(--neon); border-radius:50%; margin: 20px auto; color:#000; display:flex; align-items:center; justify-content:center; font-size:40px; font-weight:900;" id="u-avatar">R</div>
        <h2 id="u-name">Ruslan</h2>
        <div class="grid-2" style="margin: 20px 0;">
            <div class="card-btn"><b>LEVEL</b><br><span id="u-lv">1</span></div>
            <div class="card-btn"><b>XP</b><br><span id="u-xp">0</span></div>
        </div>
        <button onclick="showDep()" style="width:100%; padding:20px; border-radius:20px; border:none; background:var(--neon); color:#000; font-weight:900;">📥 ПОПОЛНИТЬ TON</button>
    </div>
</div>

<div id="p-adm" class="page" style="background:#000;">
    <div class="content">
        <h2>CONSOLE</h2>
        <div class="quest-item">RTP: <span style="color:var(--red)">30% (SLIV)</span></div>
        <div class="quest-item">BALANCE: <input type="number" id="adm-bal-in" style="width:80px"> <button onclick="setAdmBal()">SET</button></div>
        <button onclick="go('home')" style="width:100%; padding:15px; margin-top:20px;">EXIT</button>
    </div>
</div>

<div id="m-dep" class="modal">
    <h2 style="color:var(--neon)">ПОПОЛНЕНИЕ</h2>
    <p>Введите сумму TON для внесения на игровой баланс:</p>
    <input type="number" id="dep-amt" style="width:100%; padding:20px; border-radius:15px; background:#111; border:1px solid #333; color:#fff; font-size:24px; margin-bottom:20px;">
    <button onclick="pay()" style="width:100%; padding:20px; border-radius:15px; background:var(--green); border:none; font-weight:900;">ОПЛАТИТЬ</button>
    <button onclick="hideDep()" style="margin-top:10px; background:none; border:none; color:#555;">ОТМЕНА</button>
</div>

<div class="bottom-nav">
    <div class="nav-item active" id="n-home" onclick="go('home')"><i class="fas fa-home"></i>ИГРЫ</div>
    <div class="nav-item" id="n-prof" onclick="go('prof')"><i class="fas fa-user"></i>ПРОФИЛЬ</div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// CONFIG
const ADMIN_ID = 7604031975;
const WALLET = "UQBtkrIzQeK1bfSJD9N71EcvCJwnegvLs3t-fLuGgmLESSL4";

let user = {
    bal: parseFloat(localStorage.getItem('gx_bal')) || 1000,
    xp: parseInt(localStorage.getItem('gx_xp')) || 0,
    lv: 1,
    adm: 0
};

// UI SYNC
function sync() {
    document.getElementById('global-bal').innerText = user.bal.toFixed(2);
    document.getElementById('u-xp').innerText = user.xp;
    document.getElementById('u-lv').innerText = Math.floor(user.xp / 100) + 1;
    localStorage.setItem('gx_bal', user.bal);
    localStorage.setItem('gx_xp', user.xp);
}

function go(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('p-' + id).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    if(id === 'home' || id === 'prof') document.getElementById('n-' + id).classList.add('active');
    if(id === 'tower') buildTower();
    tg.HapticFeedback.impactOccurred('light');
}

// TOWER LOGIC
let tStep = 0, tBet = 0, tActive = false;
function buildTower() {
    const b = document.getElementById('tower-board');
    b.innerHTML = '';
    for(let i=0; i<8; i++) {
        let r = document.createElement('div');
        r.className = 'tower-row';
        r.id = 't-row-' + i;
        for(let j=0; j<3; j++) {
            let c = document.createElement('div');
            c.className = 't-cell';
            c.onclick = () => clickTower(i, j);
            c.innerText = 'x' + (1.5 + i*0.8).toFixed(1);
            r.appendChild(c);
        }
        b.appendChild(r);
    }
}

function startTower() {
    let amt = parseFloat(document.getElementById('tower-bet').value);
    if(amt > user.bal) return;
    user.bal -= amt; tBet = amt; sync();
    tStep = 0; tActive = true;
    document.getElementById('tower-btn').innerText = "ИГРАЕМ...";
    updateTowerRows();
}

function updateTowerRows() {
    document.querySelectorAll('.tower-row').forEach(r => r.classList.remove('active-row'));
    document.getElementById('t-row-' + tStep).classList.add('active-row');
}

function clickTower(row, cell) {
    if(!tActive || row !== tStep) return;
    let winCell = Math.floor(Math.random() * 3);
    let cells = document.getElementById('t-row-'+row).children;
    
    if(cell === winCell) {
        cells[cell].classList.add('win');
        tStep++;
        tg.HapticFeedback.notificationOccurred('success');
        if(tStep > 7) {
            let win = tBet * 10;
            user.bal += win; user.xp += 50; tActive = false;
            alert("JACKPOT! +"+win); sync();
            go('home');
        } else {
            updateTowerRows();
            document.getElementById('tower-btn').innerText = "ЗАБРАТЬ " + (tBet * (1.5 + (tStep-1)*0.8)).toFixed(2);
            document.getElementById('tower-btn').onclick = cashTower;
        }
    } else {
        cells[cell].classList.add('lose');
        tActive = false;
        tg.HapticFeedback.notificationOccurred('error');
        setTimeout(() => go('home'), 1500);
    }
}

function cashTower() {
    if(!tActive) return;
    let win = tBet * (1.5 + (tStep-1)*0.8);
    user.bal += win; user.xp += 20; tActive = false;
    sync(); go('home');
}

// DEPOSIT
function showDep() { document.getElementById('m-dep').style.display = 'flex'; }
function hideDep() { document.getElementById('m-dep').style.display = 'none'; }
function pay() {
    let a = document.getElementById('dep-amt').value;
    tg.openLink(`ton://transfer/${WALLET}?amount=${a*1e9}&text=GALAXY_ID_${tg.initDataUnsafe?.user?.id || 0}`);
    hideDep();
}

// ADM
document.getElementById('adm-trigger').onclick = () => {
    if(tg.initDataUnsafe?.user?.id != ADMIN_ID) return;
    user.adm++;
    if(user.adm >= 5) { go('adm'); user.adm = 0; }
};
function setAdmBal() { user.bal = parseFloat(document.getElementById('adm-bal-in').value); sync(); }

// INIT
sync();
if(tg.initDataUnsafe.user) {
    document.getElementById('u-name').innerText = tg.initDataUnsafe.user.first_name;
    document.getElementById('u-avatar').innerText = tg.initDataUnsafe.user.first_name[0];
}
</script>
</body>
</html>
