<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TON GALAXY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon: #00f2ff; --pink: #ff007f; --gold: #ffcc00; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        /* Главный контейнер */
        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }

        /* Баланс */
        .balance-card { background: linear-gradient(180deg, #111, #000); border: 1px solid var(--neon); border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 25px; box-shadow: 0 0 15px rgba(0,242,255,0.2); }
        .balance-num { font-size: 36px; font-weight: bold; color: var(--neon); }

        /* Стили карточек игр */
        .game-card { background: #111; border: 1px solid #222; border-radius: 25px; padding: 20px; margin-bottom: 20px; position: relative; overflow: hidden; }
        .game-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .visual-box { height: 100px; background: #000; border-radius: 15px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 1px inset #222; }

        /* Ввод ставки */
        .bet-container { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .bet-input { flex: 1; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; font-size: 18px; text-align: center; outline: none; }
        .bet-input:focus { border-color: var(--neon); }

        /* Кнопки */
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 14px; transition: 0.2s; }
        .btn-play { background: var(--neon); color: #000; box-shadow: 0 5px 15px rgba(0,242,255,0.3); }
        .btn-play:active { transform: scale(0.98); }
        .btn-pink { background: var(--pink); box-shadow: 0 5px 15px rgba(255,0,127,0.3); }

        /* Навигация */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: #000; display: flex; border-top: 1px solid #222; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #444; text-decoration: none; font-size: 11px; }
        .nav-item.active { color: var(--neon); }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="content">
        <div class="balance-card">
            <small style="color:#777">GALAXY WALLET</small>
            <div class="balance-num" id="user-balance">100.00 TON</div>
        </div>

        <div id="tab-games">
            <h2 style="margin-bottom:20px">🌌 ACTIVE GAMES</h2>

            <div class="game-card">
                <div class="game-title" style="color: var(--neon)"><i class="fas fa-circle-notch"></i> NEON SPHERE</div>
                <div class="visual-box" id="sphere-box">🔮</div>
                <div class="bet-container">
                    <input type="number" class="bet-input" id="bet-sphere" value="10" placeholder="TON">
                </div>
                <button class="btn btn-play" onclick="playGame('sphere')">УГАДАТЬ ЦВЕТ (X2.0)</button>
            </div>

            <div class="game-card">
                <div class="game-title" style="color: var(--pink)"><i class="fas fa-dot-circle"></i> BLACK HOLE</div>
                <div class="visual-box" id="hole-box">🌑</div>
                <div class="bet-container">
                    <input type="number" class="bet-input" id="bet-hole" value="5" placeholder="TON">
                </div>
                <button class="btn btn-play btn-pink" onclick="playGame('hole')">РИСКНУТЬ (X1.1 - X5.0)</button>
            </div>

            <div class="game-card">
                <div class="game-title" style="color: var(--gold)"><i class="fas fa-wave-square"></i> PULSE LINE</div>
                <div class="visual-box" id="pulse-box">📈</div>
                <div class="bet-container">
                    <input type="number" class="bet-input" id="bet-pulse" value="20" placeholder="TON">
                </div>
                <button class="btn btn-play" style="background:var(--gold)" onclick="playGame('pulse')">ПОЙМАТЬ ИМПУЛЬС</button>
            </div>
        </div>

        <div id="tab-profile" class="hidden">
            <h2 style="margin-bottom:20px">👤 USER PROFILE</h2>
            <div class="game-card">
                <h3 id="display-name">Пидор</h3>
                <p style="color: #0f8">Status: Galaxy Elite</p>
                <hr style="border: 0.5px solid #222; margin: 20px 0;">
                <button class="btn btn-play" onclick="depositMoney()">📥 ПОПОЛНИТЬ ЧЕРЕЗ КОШЕЛЕК</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-item active" onclick="switchTab('games', this)">
            <i class="fas fa-gamepad"></i>GAMES
        </a>
        <a href="#" class="nav-item" onclick="switchTab('profile', this)">
            <i class="fas fa-user-astronaut"></i>PROFILE
        </a>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // ЗАМЕНИ НА СВОЙ NGROK (ТОЛЬКО ССЫЛКУ!)
    const API_URL = "https://ТВОЙ-ССЫЛКА.ngrok-free.app";

    function switchTab(tab, el) {
        document.getElementById('tab-games').classList.toggle('hidden', tab !== 'games');
        document.getElementById('tab-profile').classList.toggle('hidden', tab !== 'profile');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        tg.HapticFeedback.impactOccurred('medium');
    }

    // ЛОГИКА ИГР
    async function playGame(type) {
        const bet = document.getElementById(`bet-${type}`).value;
        const box = document.getElementById(`${type}-box`);
        
        if (bet <= 0) {
            tg.showAlert("Введите нормальную ставку!");
            return;
        }

        tg.HapticFeedback.impactOccurred('heavy');
        box.innerHTML = "🌀"; // Анимация кручения
        
        try {
            // Стучимся в твой прекрасный big.py
            const response = await fetch(`${API_URL}/api/play/${type}?bet=${bet}`);
            const data = await response.json();
            
            setTimeout(() => {
                if(data.win || data.mult > 1.5) {
                    box.innerHTML = "💎";
                    tg.showAlert(`ПОБЕДА! Баланс обновлен.`);
                } else {
                    box.innerHTML = "💥";
                    tg.showAlert(`ПРОИГРЫШ. Попробуй еще раз!`);
                }
                updateBalanceUI();
            }, 1000);
        } catch (e) {
            tg.showAlert("Ошибка связи с сервером");
            box.innerHTML = "❌";
        }
    }

    // ПОПОЛНЕНИЕ ВНУТРИ АПКИ
    function depositMoney() {
        tg.showPopup({
            title: 'Пополнение',
            message: 'Введите сумму в TON, которую хотите внести на баланс:',
            buttons: [{id: 'ok', type: 'default', text: 'Ввести сумму'}]
        }, (btnId) => {
            if (btnId === 'ok') {
                const amount = prompt("Сумма TON:", "10");
                if (amount) {
                    // Генерируем ссылку для открытия кошелька
                    const walletAddr = "UQBtkrIzQeK1bfSJD9N71EcvCJwnegvLs3t-fLuGgmLESSL4"; // ВСТАВЬ СВОЙ АДРЕС
                    const tonLink = `ton://transfer/${walletAddr}?amount=${amount * 1000000000}&text=GalaxyDeposit`;
                    tg.openLink(tonLink);
                }
            }
        });
    }

    async function updateBalanceUI() {
        try {
            const res = await fetch(`${API_URL}/api/balance`);
            const data = await res.json();
            document.getElementById('user-balance').innerText = data.balance.toFixed(2) + " TON";
        } catch(e) {}
    }

    // Инициализация
    if(tg.initDataUnsafe.user) {
        document.getElementById('display-name').innerText = tg.initDataUnsafe.user.first_name;
    }
    updateBalanceUI();
</script>

</body>
</html>
